appId: com.auraboard.app
productName: AuraBoard
copyright: Copyright © 2026 AuraBoard

publish:
  provider: github
  owner: dexisworking
  repo: auraboard

directories:
  buildResources: assets
  output: release

files:
  - out/**/*
  - package.json
  - "!assets/icon-src.html"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AuraBoard
  include: installer.nsh
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: false

extraResources:
  - from: assets/
    to: assets/
    filter:
      - "**/*"
      - "!icon-src.html"
