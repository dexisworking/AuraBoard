# appId is the NSIS upgrade identity — NSIS derives the uninstall GUID from it.
# Changing it makes new installers install ALONGSIDE existing copies rather than
# upgrading them, and turns auto-update into a silent duplicate install. It is
# deliberately unchanged by the DexForge rebrand.
appId: com.auraboard.app
productName: AuraBoard
copyright: Copyright © 2026 DexForge

# Two update lanes on one repo. The standard (no-packs) build stays on `latest`;
# `build:win` overrides this to `predefined` via -c.publish.channel, which both
# names the manifest (predefined.yml) and bakes `channel: predefined` into the
# app-update.yml shipped inside that build. Without that the two variants share
# one lane and a predefined release lands on people who chose the small one.
publish:
  provider: github
  owner: dexisworking
  repo: auraboard
  channel: latest

directories:
  buildResources: assets
  output: release

files:
  - out/**/*
  - package.json
  - "!assets/icon-src.html"

win:
  target:
    - target: nsis
      arch:
        - x64
    # Portable ZIP. Unsigned NSIS .exe downloads are what browser SmartScreen
    # auto-deletes on reputation grounds; a zip of the unpacked app is far less
    # likely to be discarded, so it gives people a way in while the installer
    # builds reputation (or until it is code-signed).
    - target: zip
      arch:
        - x64
  icon: assets/icon.ico
  # Default for non-nsis targets (the zip). nsis overrides this below — calling
  # a portable archive "Setup" would be actively misleading.
  artifactName: ${productName}-${version}-portable.${ext}

nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AuraBoard
  include: installer.nsh
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: false

extraResources:
  - from: assets/
    to: assets/
    filter:
      - "**/*"
      - "!icon-src.html"
  # Built-in slideshow packs. `packs/` is gitignored but populated automatically
  # by `build:win` (which runs `packs:sync` first), so packs ship by default.
  # If a source folder is missing the build still succeeds with that pack empty.
  - from: packs/
    to: packs/
    filter:
      - "**/*"
